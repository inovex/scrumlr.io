name: Package

on:
  workflow_call:
    outputs:
      frontend-image-tag:
        description: The tag of the frontend image (amd64)
        value: ${{ jobs.export-outputs.outputs.frontend-image-tag }}
      server-image-tag:
        description: The tag of the server image (amd64)
        value: ${{ jobs.export-outputs.outputs.server-image-tag }}
      frontend-image-tag-arm64:
        description: The tag of the frontend image (arm64)
        value: ${{ jobs.export-outputs.outputs.frontend-image-tag-arm64 }}
      server-image-tag-arm64:
        description: The tag of the server image (arm64)
        value: ${{ jobs.export-outputs.outputs.server-image-tag-arm64 }}

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build frontend (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            suffix: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: "-arm64"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Default platform env (only for arm64)
        if: matrix.arch == 'arm64'
        run: echo "DOCKER_DEFAULT_PLATFORM=${{ matrix.platform }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend metadata (${{ matrix.arch }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/inovex/scrumlr.io/scrumlr-frontend
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=scrumlr.io Frontend
            org.opencontainers.image.description=The web client for scrumlr.io${{ matrix.suffix }}

      - name: Build & push (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/inovex/scrumlr.io/scrumlr-frontend:cache
          cache-to: type=registry,ref=ghcr.io/inovex/scrumlr.io/scrumlr-frontend:cache,mode=max

      - name: Extract tag and save artifact
        shell: bash
        run: |
          # Match sha-<hash> for amd64 and sha-<hash>-arm64 for arm64
          echo "${DOCKER_METADATA_OUTPUT_TAGS}" | grep -oP 'sha-[a-f0-9]+(-arm64)?' | head -n1 > tag.txt
          echo "Built tag: $(cat tag.txt)"

      - name: Upload tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.arch }}
          path: tag.txt
          if-no-files-found: error


  build-server:
    name: Build server (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            suffix: ""
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: "-arm64"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Default platform env (only for arm64)
        if: matrix.arch == 'arm64'
        run: echo "DOCKER_DEFAULT_PLATFORM=${{ matrix.platform }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Server metadata (${{ matrix.arch }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/inovex/scrumlr.io/scrumlr-server
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=scrumlr.io Server
            org.opencontainers.image.description=The server for scrumlr.io${{ matrix.suffix }}

      - name: Build & push (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: ./server/src
          file: ./server/src/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract tag and save artifact
        shell: bash
        run: |
          echo "${DOCKER_METADATA_OUTPUT_TAGS}" | grep -oP 'sha-[a-f0-9]+(-arm64)?' | head -n1 > tag.txt
          echo "Built tag: $(cat tag.txt)"

      - name: Upload tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.arch }}
          path: tag.txt
          if-no-files-found: error

  export-outputs:
    name: Collect & export image tags
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - build-server
    outputs:
      frontend-image-tag: ${{ steps.collect.outputs.frontend_image_tag }}
      server-image-tag: ${{ steps.collect.outputs.server_image_tag }}
      frontend-image-tag-arm64: ${{ steps.collect.outputs.frontend_image_tag_arm64 }}
      server-image-tag-arm64: ${{ steps.collect.outputs.server_image_tag_arm64 }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-*"
          path: artifacts
          merge-multiple: true

      - name: Show what we got
        shell: bash
        run: |
          shopt -s nullglob
          for f in artifacts/*-*; do
           echo "$(basename "$f") -> $(cat "$f")"
          done

      - name: Set outputs
        id: collect
        shell: bash
        run: |
          fe_amd64=$(cat artifacts/frontend-amd64 2>/dev/null || true)
          sv_amd64=$(cat artifacts/server-amd64   2>/dev/null || true)
          fe_arm64=$(cat artifacts/frontend-arm64 2>/dev/null || true)
          sv_arm64=$(cat artifacts/server-arm64   2>/dev/null || true)

          echo "frontend_image_tag=${fe_amd64}"       >> "$GITHUB_OUTPUT"
          echo "server_image_tag=${sv_amd64}"         >> "$GITHUB_OUTPUT"
          echo "frontend_image_tag_arm64=${fe_arm64}" >> "$GITHUB_OUTPUT"
          echo "server_image_tag_arm64=${sv_arm64}"   >> "$GITHUB_OUTPUT"
