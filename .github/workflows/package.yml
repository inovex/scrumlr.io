name: Package

on:
  workflow_call:
    outputs:
      frontend-image-tag:
        description: The tag of the frontend image (amd64)
        value: ${{ jobs.export-outputs.outputs.frontend-image-tag }}
      server-image-tag:
        description: The tag of the server image (amd64)
        value: ${{ jobs.export-outputs.outputs.server-image-tag }}

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build frontend (${{ matrix.build_info.platform }})
    runs-on: ${{ matrix.build_info.runner }}
    strategy:
      fail-fast: false
      matrix:
        build_info:
          - { platform: 'linux/amd64', runner: 'ubuntu-latest',    suffix: '' }
          - { platform: 'linux/arm64', runner: 'ubuntu-24.04-arm', suffix: '-arm64' }
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend metadata (${{ matrix.build_info.platform }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/inovex/scrumlr.io/scrumlr-frontend
          flavor: |
            suffix=${{ matrix.build_info.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=scrumlr.io Frontend
            org.opencontainers.image.description=The web client for scrumlr.io${{ matrix.build_info.suffix }}

      - name: Build & push (${{ matrix.build_info.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.build_info.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/inovex/scrumlr.io/scrumlr-frontend:cache
          cache-to: type=registry,ref=ghcr.io/inovex/scrumlr.io/scrumlr-frontend:cache,mode=max

      - name: Extract tag and save artifact
        shell: bash
        run: |
          arch="$(echo "${{ matrix.build_info.platform }}" | cut -d/ -f2)"
          echo "${{ steps.meta.outputs.tags }}" \
            | grep -oE 'sha-[a-f0-9]+(-arm64)?' \
            | head -n1 > "frontend-${arch}"
          echo "Built tag: $(cat frontend-${arch})"
          if [ ! -s "frontend-${arch}" ]; then
            echo "ERROR: No frontend image sha tag produced"; exit 1
          fi

      - name: Upload tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.build_info.platform }}
          path: frontend-*
          if-no-files-found: error

  build-server:
    name: Build server (${{ matrix.build_info.platform }})
    runs-on: ${{ matrix.build_info.runner }}
    strategy:
      fail-fast: false
      matrix:
        build_info:
          - { platform: 'linux/amd64', runner: 'ubuntu-latest',    suffix: '' }
          - { platform: 'linux/arm64', runner: 'ubuntu-24.04-arm', suffix: '-arm64' }
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Server metadata (${{ matrix.build_info.platform }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/inovex/scrumlr.io/scrumlr-server
          flavor: |
            suffix=${{ matrix.build_info.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=scrumlr.io Server
            org.opencontainers.image.description=The server for scrumlr.io${{ matrix.build_info.suffix }}

      - name: Build & push (${{ matrix.build_info.platform }})
        uses: docker/build-push-action@v6
        with:
          context: ./server/src
          file: ./server/src/Dockerfile
          platforms: ${{ matrix.build_info.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract tag and save artifact
        shell: bash
        run: |
          arch="$(echo "${{ matrix.build_info.platform }}" | cut -d/ -f2)"   # -> amd64 or arm64
          echo "${{ steps.meta.outputs.tags }}" \
            | grep -oE 'sha-[a-f0-9]+(-arm64)?' \
            | head -n1 > "server-${arch}"
          echo "Built tag: $(cat server-${arch})"
          if [ ! -s "server-${arch}" ]; then
            echo "ERROR: No server image sha tag produced"; exit 1
          fi

      - name: Upload tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.build_info.platform }}
          path: server-*
          if-no-files-found: error

  export-outputs:
    name: Collect & export image tags
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs:
      - build-frontend
      - build-server
    outputs:
      frontend-image-tag: ${{ steps.collect.outputs.frontend_image_tag }}
      server-image-tag: ${{ steps.collect.outputs.server_image_tag }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-*"
          path: artifacts
          merge-multiple: true

      - name: Show what we got
        shell: bash
        run: |
          shopt -s nullglob
          for f in artifacts/*-*; do
            echo "$(basename "$f") -> $(cat "$f")"
          done

      - name: Set outputs
        id: collect
        shell: bash
        run: |
          fe_amd64=$(cat artifacts/frontend-amd64 2>/dev/null || true)
          sv_amd64=$(cat artifacts/server-amd64   2>/dev/null || true)

          if [ -z "$fe_amd64" ] || [ -z "$sv_amd64" ]; then
            echo "ERROR: Missing amd64 image tag(s)"; exit 1
          fi

          echo "frontend_image_tag=${fe_amd64}" >> "$GITHUB_OUTPUT"
          echo "server_image_tag=${sv_amd64}"   >> "$GITHUB_OUTPUT"
