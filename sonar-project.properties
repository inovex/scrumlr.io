sonar.projectKey=scrumlr_scrumlr
sonar.organization=scrumlr

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=scrumlr
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

sonar.typescript.tsconfigPath=tsconfig.json
sonar.go.coverage.reportPaths=server/src/coverage.txt

# server/src/swagger/docs.go is generated by swag
sonar.coverage.exclusions=src/**/*,**/*_test.go,**/mock_*.go,mock_*.go,cypress/**/*,server/e2e-tests/**/*,server/src/swagger/docs.go

# removes line duplicaiton checks for test files
sonar.cpd.exclusions=server/src/**/*_test.go,server/e2e-tests/**/*
